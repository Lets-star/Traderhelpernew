name: Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check web_ui.py formatting
      run: |
        pip install black isort
        black --check web_ui.py
        isort --check web_ui.py
        python -m tabnanny web_ui.py

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=indicator_collector --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Run trading system tests
      run: |
        pytest tests/test_signal_generator.py -v
        pytest tests/test_position_manager.py -v
        pytest tests/test_statistics_optimizer.py -v
        pytest tests/test_web_ui_automated_signals.py -v

    - name: Check Python syntax
      run: |
        python -m py_compile indicator_collector/*.py
        python -m py_compile indicator_collector/trading_system/*.py

    - name: Test JSON schema validity
      run: |
        python -c "import json; json.load(open('samples/trading_signal_schema.json'))"
        python -c "import json; json.load(open('samples/example_buy_signal.json'))"
        python -c "import json; json.load(open('samples/example_sell_signal.json'))"
        python -c "import json; json.load(open('samples/example_neutral_signal.json'))"
        python -c "import json; json.load(open('samples/macro_filter_config.json'))"
